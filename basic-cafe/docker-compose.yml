services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: basic_cafe
      POSTGRES_PASSWORD: basic_cafe
      POSTGRES_DB: basic_cafe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@basic.cafe
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
